<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doubter Cloud</title>
  <style>
    :root{--bg:#0a0a0a;--card:#111;--border:#333;--text:#fff;--accent:#4ade80;--warn:#f87171}
    *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
    h1{font-size:2.5rem;letter-spacing:2px;margin-bottom:10px}p.sub{color:#888;margin-bottom:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;width:100%;max-width:1100px}
    .card{background:var(--card);border:1px solid var(--border);padding:24px;border-radius:12px}
    .card h3{font-size:1.4rem;margin-bottom:8px}.card .specs{color:#aaa;font-size:0.9rem;margin-bottom:12px}
    .card .price{font-size:1.8rem;font-weight:700;margin:12px 0}.card .stock{display:flex;gap:10px;margin-bottom:16px;font-size:0.85rem}
    .stock span{background:#222;padding:4px 8px;border-radius:6px}.stock .ok{color:var(--accent)}.stock .out{color:var(--warn)}
    .btn{display:block;width:100%;padding:12px;background:transparent;border:1px solid var(--text);color:var(--text);border-radius:8px;cursor:pointer;font-weight:600;transition:0.2s}.btn:hover{background:var(--text);color:#000}.btn:disabled{opacity:0.4;cursor:not-allowed}
    .loader{text-align:center;padding:60px;color:#666}.error{color:var(--warn);text-align:center;margin-top:20px}
    footer{margin-top:60px;color:#555;font-size:0.8rem}
  </style>
</head>
<body>
  <h1>DOUBTER <span style="color:#888">CLOUD</span></h1>
  <p class="sub">Secure, anonymous VPS hosting. Choose your power.</p>
  <div id="app" class="grid"><div class="loader">Yükleniyor...</div></div>
  <footer>© 2026 Doubter Cloud. All rights reserved.</footer>
  <script>
    const API = '/api/stock';
    const PKGS = {
      starter: {name:'Starter', cpu:1, ram:1, ssd:20, price:4.99, emoji:'⚡'},
      pro: {name:'Pro', cpu:2, ram:2, ssd:40, price:9.99, emoji:'🔥'},
      enterprise: {name:'Enterprise', cpu:4, ram:4, ssd:80, price:15.99, emoji:'👑'}
    };
    async function load() {
      try {
        const res = await fetch(API);
        const data = await res.json();
        const container = document.getElementById('app');
        container.innerHTML = '';
        Object.entries(PKGS).forEach(([key, p]) => {
          const fr = data.breakdown[`${key}_fr`] || 0;
          const us = data.breakdown[`${key}_us`] || 0;
          const el = document.createElement('div');
          el.className = 'card';
          el.innerHTML = `
            <h3>${p.emoji} ${p.name}</h3>
            <div class="specs">${p.cpu} vCPU · ${p.ram}GB RAM · ${p.ssd}GB SSD</div>
            <div class="price">$${p.price.toFixed(2)}<small style="font-size:0.8rem;color:#888">/mo</small></div>
            <div class="stock">
              <span>🇫🇷 FR: <b class="${fr>0?'ok':'out'}">${fr>0?fr:'OUT'}</b></span>
              <span>🇺🇸 US: <b class="${us>0?'ok':'out'}">${us>0?us:'OUT'}</b></span>
            </div>
            <button class="btn" ${fr===0 && us===0 ? 'disabled' : ''}>${fr===0 && us===0 ? 'Tükendi' : 'Seç'}</button>
          `;
          container.appendChild(el);
        });
      } catch(e) {
        document.getElementById('app').innerHTML = `<div class="error">⚠️ API bağlantısı kurulamadı.<br><small>${e.message}</small></div>`;
      }
    }
    load();
  </script>
</body>
</html>
